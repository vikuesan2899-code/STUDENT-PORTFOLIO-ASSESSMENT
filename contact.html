<section class="contact">

<h2>Contact Me</h2>

<form id="contactForm">

<label for="name">
Name
</label>

<input
type="text"
id="name"
placeholder="Enter your name">

<label for="email">
Email
</label>

<input
type="email"
id="email"
placeholder="Enter your email">

<label for="phone">
Phone Number
</label>

<input
type="text"
id="phone"
placeholder=" 11 digits only">

<label for="message">
Message
</label>

<textarea
id="message"
rows="5"
placeholder="Write your message..."></textarea>

<button type="submit">
Submit
</button>

<p id="formMessage"></p>

</form>
</section>
